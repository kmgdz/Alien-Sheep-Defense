<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Sheep Defense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #0f172a; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useEffect, useRef, useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Play, RotateCcw, Skull, Tractor } from 'lucide-react';

        // --- Funny Audio Engine ---
        class AudioEngine {
          ctx = null;
          masterGain = null;

          init() {
            if (this.ctx) return;
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;
            
            this.ctx = new AudioContextClass();
            this.masterGain = this.ctx.createGain();
            this.masterGain.gain.value = 0.4;
            this.masterGain.connect(this.ctx.destination);
          }

          playBaa() {
            if (!this.ctx || !this.masterGain) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, this.ctx.currentTime + 0.3);
            
            const lfo = this.ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 15;
            const lfoGain = this.ctx.createGain();
            lfoGain.gain.value = 20;
            lfo.connect(lfoGain);
            lfoGain.connect(osc.frequency);
            lfo.start();
            lfo.stop(this.ctx.currentTime + 0.3);

            gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
            
            osc.connect(gain);
            gain.connect(this.masterGain);
            
            osc.start();
            osc.stop(this.ctx.currentTime + 0.3);
          }

          playPop() {
            if (!this.ctx || !this.masterGain) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(this.masterGain);
            
            osc.start();
            osc.stop(this.ctx.currentTime + 0.1);
          }

          playCowMoo() {
            if (!this.ctx || !this.masterGain) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, this.ctx.currentTime + 0.8);
            
            gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.8);
            
            osc.connect(gain);
            gain.connect(this.masterGain);
            
            osc.start();
            osc.stop(this.ctx.currentTime + 0.8);
          }
        }

        const audio = new AudioEngine();

        function App() {
          const canvasRef = useRef(null);
          const [gameState, setGameState] = useState('menu');
          const [score, setScore] = useState(0);
          const [wave, setWave] = useState(1);
          const [cowsAlive, setCowsAlive] = useState(5);

          const CANVAS_WIDTH = 800;
          const CANVAS_HEIGHT = 600;

          useEffect(() => {
            if (gameState !== 'playing') return;

            audio.init();

            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d', { alpha: false });
            if (!ctx) return;

            let animationId;
            let frameCount = 0;
            
            let currentScore = 0;
            let currentWave = 1;
            let screenShake = 0;
            let crosshairX = CANVAS_WIDTH / 2;
            let crosshairY = CANVAS_HEIGHT / 2;
            let isMouseDown = false;
            let ammoCooldown = 0;

            const cows = [
              { x: 150, y: CANVAS_HEIGHT - 40, alive: true, frame: 0 },
              { x: 280, y: CANVAS_HEIGHT - 40, alive: true, frame: 0 },
              { x: 400, y: CANVAS_HEIGHT - 40, alive: true, frame: 0 },
              { x: 520, y: CANVAS_HEIGHT - 40, alive: true, frame: 0 },
              { x: 650, y: CANVAS_HEIGHT - 40, alive: true, frame: 0 },
            ];

            const cannon = { x: CANVAS_WIDTH / 2, y: CANVAS_HEIGHT - 20, angle: 0 };

            const flyingSheep = [];
            const ufos = [];
            const explosions = [];
            const particles = [];
            const clouds = Array.from({ length: 5 }, () => ({
              x: Math.random() * CANVAS_WIDTH,
              y: Math.random() * 200 + 50,
              speed: Math.random() * 0.5 + 0.1,
              size: Math.random() * 30 + 20
            }));

            const handleMouseMove = (e) => {
              const rect = canvas.getBoundingClientRect();
              const scaleX = canvas.width / rect.width;
              const scaleY = canvas.height / rect.height;
              crosshairX = (e.clientX - rect.left) * scaleX;
              crosshairY = (e.clientY - rect.top) * scaleY;
              cannon.angle = Math.atan2(crosshairY - cannon.y, crosshairX - cannon.x);
            };

            const handleMouseDown = () => {
              isMouseDown = true;
              fireSheep();
            };

            const handleMouseUp = () => {
              isMouseDown = false;
            };

            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mousedown', handleMouseDown);
            window.addEventListener('mouseup', handleMouseUp);

            function createParticles(x, y, color, count, speed = 3) {
              for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const v = Math.random() * speed;
                particles.push({
                  x, y, vx: Math.cos(angle) * v, vy: Math.sin(angle) * v,
                  life: 1, color, size: Math.random() * 4 + 2,
                  rotation: Math.random() * Math.PI * 2,
                  rotSpeed: (Math.random() - 0.5) * 0.2
                });
              }
            }

            function fireSheep() {
              if (ammoCooldown > 0) return;
              
              const speed = 12;
              flyingSheep.push({
                x: cannon.x,
                y: cannon.y,
                targetX: crosshairX,
                targetY: crosshairY,
                vx: Math.cos(cannon.angle) * speed,
                vy: Math.sin(cannon.angle) * speed,
                rotation: 0,
                rotSpeed: (Math.random() - 0.5) * 0.5
              });

              audio.playBaa();
              ammoCooldown = 20;
            }

            function spawnUFO() {
              const startX = Math.random() > 0.5 ? -50 : CANVAS_WIDTH + 50;
              const startY = Math.random() * 150 + 50;
              
              const aliveCows = cows.filter(c => c.alive);
              if (aliveCows.length === 0) return;

              const targetCow = aliveCows[Math.floor(Math.random() * aliveCows.length)];
              const speed = 1.5 + (currentWave * 0.3);

              ufos.push({
                x: startX, y: startY, 
                targetX: targetCow.x, targetY: startY,
                vx: startX < 0 ? speed : -speed, vy: 0,
                state: 'moving',
                timer: 0,
                wobble: Math.random() * Math.PI * 2,
                cowTarget: targetCow
              });
            }

            function createExplosion(x, y, isSheep) {
              explosions.push({
                x, y,
                radius: 1,
                maxRadius: isSheep ? 45 : 35,
                growthRate: 3,
                state: 'growing',
                color: isSheep ? '#ffffff' : '#a855f7',
                isSheep
              });
              audio.playPop();
            }

            function update() {
              frameCount++;
              if (ammoCooldown > 0) ammoCooldown--;

              clouds.forEach(c => {
                c.x += c.speed;
                if (c.x > CANVAS_WIDTH + 100) c.x = -100;
              });

              if (frameCount % 30 === 0) {
                cows.forEach(c => {
                  if (c.alive && Math.random() < 0.3) c.frame = c.frame === 0 ? 1 : 0;
                });
              }

              const spawnRate = Math.max(40, 120 - (currentWave * 10));
              if (frameCount % spawnRate === 0) {
                spawnUFO();
              }

              if (frameCount % 600 === 0) {
                currentWave++;
                setWave(currentWave);
              }

              for (let i = flyingSheep.length - 1; i >= 0; i--) {
                const s = flyingSheep[i];
                s.x += s.vx;
                s.y += s.vy;
                s.rotation += s.rotSpeed;

                if (s.vy < 0 && s.y <= s.targetY) {
                  createExplosion(s.targetX, s.targetY, true);
                  flyingSheep.splice(i, 1);
                } else if (s.x < -50 || s.x > CANVAS_WIDTH + 50 || s.y < -50) {
                  flyingSheep.splice(i, 1);
                }
              }

              for (let i = ufos.length - 1; i >= 0; i--) {
                const ufo = ufos[i];
                ufo.wobble += 0.1;
                let destroyed = false;

                for (let j = 0; j < explosions.length; j++) {
                  const exp = explosions[j];
                  const dist = Math.hypot(ufo.x - exp.x, ufo.y - exp.y);
                  if (dist < exp.radius + 20) {
                    createExplosion(ufo.x, ufo.y, false);
                    createParticles(ufo.x, ufo.y, '#a855f7', 15, 5);
                    createParticles(ufo.x, ufo.y, '#22c55e', 10, 3);
                    currentScore += 100 * currentWave;
                    setScore(currentScore);
                    destroyed = true;
                    
                    if (ufo.state === 'beaming' && ufo.cowTarget && ufo.cowTarget.alive) {
                       ufo.cowTarget.y = CANVAS_HEIGHT - 40;
                    }
                    break;
                  }
                }

                if (destroyed) {
                  ufos.splice(i, 1);
                  continue;
                }

                if (ufo.state === 'moving') {
                  const dx = ufo.targetX - ufo.x;
                  if (Math.abs(dx) < 5) {
                    ufo.vx = 0;
                    ufo.state = 'beaming';
                    ufo.timer = 120;
                  } else {
                    ufo.x += Math.sign(dx) * Math.abs(ufo.vx);
                  }
                  ufo.y += Math.sin(ufo.wobble) * 1;
                } 
                else if (ufo.state === 'beaming') {
                  ufo.timer--;
                  ufo.y += Math.sin(ufo.wobble) * 0.5;
                  
                  if (ufo.cowTarget && ufo.cowTarget.alive) {
                     ufo.cowTarget.y = ufo.y + 100 + (ufo.timer / 120) * (CANVAS_HEIGHT - 40 - (ufo.y + 100));
                  }

                  if (ufo.timer <= 0) {
                    if (ufo.cowTarget && ufo.cowTarget.alive) {
                      ufo.cowTarget.alive = false;
                      audio.playCowMoo();
                      screenShake = 10;
                      setCowsAlive(cows.filter(c => c.alive).length);
                    }
                    ufo.state = 'fleeing';
                    ufo.vy = -3;
                  }
                }
                else if (ufo.state === 'fleeing') {
                  ufo.y += ufo.vy;
                  if (ufo.y < -50) ufos.splice(i, 1);
                }
              }

              for (let i = explosions.length - 1; i >= 0; i--) {
                const exp = explosions[i];
                if (exp.state === 'growing') {
                  exp.radius += exp.growthRate;
                  if (exp.radius >= exp.maxRadius) exp.state = 'shrinking';
                } else {
                  exp.radius -= exp.growthRate * 0.3;
                  if (exp.radius <= 0) explosions.splice(i, 1);
                }
              }

              for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.15;
                p.rotation += p.rotSpeed;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
              }

              if (screenShake > 0) screenShake *= 0.9;
              if (screenShake < 0.5) screenShake = 0;

              if (cows.filter(c => c.alive).length === 0) {
                setGameState('gameover');
              }
            }

            function draw() {
              if (!ctx || !canvas) return;

              ctx.fillStyle = '#38bdf8';
              ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

              ctx.save();
              if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
              }

              ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
              clouds.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
                ctx.arc(c.x + c.size * 0.8, c.y - c.size * 0.3, c.size * 0.8, 0, Math.PI * 2);
                ctx.arc(c.x + c.size * 1.5, c.y, c.size * 0.9, 0, Math.PI * 2);
                ctx.fill();
              });

              ctx.fillStyle = '#4ade80';
              ctx.beginPath();
              ctx.moveTo(0, CANVAS_HEIGHT);
              ctx.lineTo(0, CANVAS_HEIGHT - 60);
              ctx.quadraticCurveTo(CANVAS_WIDTH / 2, CANVAS_HEIGHT - 120, CANVAS_WIDTH, CANVAS_HEIGHT - 60);
              ctx.lineTo(CANVAS_WIDTH, CANVAS_HEIGHT);
              ctx.fill();
              
              ctx.fillStyle = '#22c55e';
              ctx.beginPath();
              ctx.moveTo(0, CANVAS_HEIGHT);
              ctx.lineTo(0, CANVAS_HEIGHT - 30);
              ctx.quadraticCurveTo(CANVAS_WIDTH / 2, CANVAS_HEIGHT - 80, CANVAS_WIDTH, CANVAS_HEIGHT - 20);
              ctx.lineTo(CANVAS_WIDTH, CANVAS_HEIGHT);
              ctx.fill();

              ufos.forEach(ufo => {
                if (ufo.state === 'beaming') {
                  ctx.fillStyle = `rgba(168, 85, 247, ${0.3 + Math.sin(frameCount * 0.2) * 0.1})`;
                  ctx.beginPath();
                  ctx.moveTo(ufo.x - 15, ufo.y + 10);
                  ctx.lineTo(ufo.x + 15, ufo.y + 10);
                  ctx.lineTo(ufo.x + 40, CANVAS_HEIGHT);
                  ctx.lineTo(ufo.x - 40, CANVAS_HEIGHT);
                  ctx.fill();
                }
              });

              cows.forEach(cow => {
                if (!cow.alive) return;
                ctx.save();
                ctx.translate(cow.x, cow.y);
                
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-15, -10, 30, 20);
                ctx.fillStyle = '#000000';
                ctx.fillRect(-10, -5, 8, 10);
                ctx.fillRect(5, -10, 10, 8);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(10, -15, 12, 12);
                ctx.fillStyle = '#f472b6';
                ctx.fillRect(18, -10, 6, 6);
                ctx.fillStyle = '#000000';
                const legOffset = cow.frame === 0 ? 0 : 2;
                ctx.fillRect(-12, 10, 4, 8 - legOffset);
                ctx.fillRect(-4, 10, 4, 8 + legOffset);
                ctx.fillRect(6, 10, 4, 8 - legOffset);
                ctx.fillRect(12, 10, 4, 8 + legOffset);
                
                ctx.restore();
              });

              ctx.save();
              ctx.translate(cannon.x, cannon.y);
              ctx.fillStyle = '#475569';
              ctx.beginPath();
              ctx.arc(0, 0, 25, Math.PI, 0);
              ctx.fill();
              ctx.rotate(cannon.angle);
              ctx.fillStyle = '#1e293b';
              ctx.fillRect(0, -10, 40, 20);
              ctx.fillStyle = '#64748b';
              ctx.fillRect(35, -12, 10, 24);
              ctx.restore();

              flyingSheep.forEach(s => {
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(s.rotation);
                
                ctx.fillStyle = '#f8fafc';
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI * 2);
                ctx.arc(-6, -6, 8, 0, Math.PI * 2);
                ctx.arc(6, -6, 8, 0, Math.PI * 2);
                ctx.arc(-8, 4, 8, 0, Math.PI * 2);
                ctx.arc(8, 4, 8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(6, -4, 8, 8);
                ctx.fillRect(-8, 10, 4, 6);
                ctx.fillRect(4, 10, 4, 6);
                
                ctx.restore();
              });

              ufos.forEach(ufo => {
                ctx.save();
                ctx.translate(ufo.x, ufo.y);
                ctx.rotate(Math.sin(ufo.wobble) * 0.1);
                
                ctx.fillStyle = 'rgba(167, 243, 208, 0.6)';
                ctx.beginPath();
                ctx.arc(0, -5, 15, Math.PI, 0);
                ctx.fill();
                
                ctx.fillStyle = '#22c55e';
                ctx.beginPath();
                ctx.arc(0, -5, 8, Math.PI, 0);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.fillRect(-2, -10, 4, 4);

                ctx.fillStyle = '#94a3b8';
                ctx.beginPath();
                ctx.ellipse(0, 0, 30, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = frameCount % 20 < 10 ? '#ef4444' : '#3b82f6';
                ctx.beginPath();
                ctx.arc(-20, 0, 3, 0, Math.PI*2);
                ctx.arc(0, 3, 3, 0, Math.PI*2);
                ctx.arc(20, 0, 3, 0, Math.PI*2);
                ctx.fill();

                ctx.restore();
              });

              explosions.forEach(exp => {
                ctx.fillStyle = exp.color;
                ctx.globalAlpha = exp.state === 'shrinking' ? exp.radius / exp.maxRadius : 1;
                
                ctx.beginPath();
                if (exp.isSheep) {
                  for(let i=0; i<6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const cx = exp.x + Math.cos(angle) * (exp.radius * 0.5);
                    const cy = exp.y + Math.sin(angle) * (exp.radius * 0.5);
                    ctx.arc(cx, cy, exp.radius * 0.6, 0, Math.PI * 2);
                  }
                } else {
                  ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.globalAlpha = 1;
              });

              particles.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
              });

              ctx.strokeStyle = ammoCooldown > 0 ? '#ef4444' : '#000000';
              ctx.lineWidth = 2;
              ctx.setLineDash([5, 5]);
              ctx.beginPath();
              ctx.arc(crosshairX, crosshairY, 15, 0, Math.PI * 2);
              ctx.stroke();
              ctx.setLineDash([]);
              ctx.beginPath();
              ctx.moveTo(crosshairX - 20, crosshairY);
              ctx.lineTo(crosshairX + 20, crosshairY);
              ctx.moveTo(crosshairX, crosshairY - 20);
              ctx.lineTo(crosshairX, crosshairY + 20);
              ctx.stroke();

              ctx.restore();
            }

            function loop(timestamp) {
              update();
              draw();
              animationId = requestAnimationFrame(loop);
            }

            animationId = requestAnimationFrame(loop);

            return () => {
              cancelAnimationFrame(animationId);
              window.removeEventListener('mousemove', handleMouseMove);
              window.removeEventListener('mousedown', handleMouseDown);
              window.removeEventListener('mouseup', handleMouseUp);
            };
          }, [gameState]);

          return (
            <div className="min-h-screen bg-sky-900 text-slate-100 font-sans flex flex-col items-center justify-center p-4 selection:bg-sky-500/30 cursor-none">
              
              <div className="w-full max-w-[800px] flex justify-between items-center mb-4 px-4">
                <div className="flex flex-col">
                  <span className="text-sky-200 text-xs font-bold tracking-widest uppercase">Score</span>
                  <span className="text-white font-black text-4xl drop-shadow-md">
                    {score.toString().padStart(6, '0')}
                  </span>
                </div>
                
                <div className="flex gap-8">
                  <div className="flex flex-col items-center">
                    <span className="text-sky-200 text-xs font-bold tracking-widest uppercase mb-1">Wave</span>
                    <span className="text-amber-300 font-black text-3xl drop-shadow-md">
                      {wave}
                    </span>
                  </div>
                  <div className="flex flex-col items-center">
                    <span className="text-sky-200 text-xs font-bold tracking-widest uppercase mb-1">Cows Left</span>
                    <div className="flex gap-2 mt-1">
                      {[1, 2, 3, 4, 5].map(i => (
                        <div key={i} className={`w-6 h-6 rounded-md flex items-center justify-center ${i <= cowsAlive ? 'bg-white text-black' : 'bg-sky-800 text-sky-900'}`}>
                          <span className="text-xs font-bold">🐮</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              <div className="relative rounded-2xl overflow-hidden border-4 border-white shadow-[0_20px_50px_rgba(0,0,0,0.5)] bg-sky-400">
                <canvas 
                  ref={canvasRef} 
                  width={800} 
                  height={600} 
                  className="block"
                  style={{ width: '100%', maxWidth: '800px', height: 'auto', aspectRatio: '4/3' }}
                />

                {gameState === 'menu' && (
                  <div className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-md">
                    <div className="bg-slate-900/50 border border-white/10 p-10 rounded-3xl text-center max-w-lg shadow-[0_0_50px_rgba(0,0,0,0.5)] backdrop-blur-xl">
                      <div className="relative inline-block mb-6">
                        <div className="absolute inset-0 bg-purple-500 blur-xl opacity-50 rounded-full animate-pulse"></div>
                        <Tractor className="w-24 h-24 text-green-400 relative z-10 drop-shadow-[0_0_15px_rgba(74,222,128,0.8)]" />
                      </div>
                      
                      <h2 className="text-5xl font-black mb-6 uppercase tracking-tighter leading-none">
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600 drop-shadow-sm">Alien Sheep</span><br/>
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-fuchsia-600 drop-shadow-sm">Defense</span>
                      </h2>
                      
                      <div className="text-left bg-black/40 p-6 rounded-2xl border border-white/5 mb-8 space-y-4 text-base text-slate-300 font-medium shadow-inner">
                        <p className="flex items-center gap-3"><span className="text-2xl">👽</span> UFOs are trying to abduct your precious cows!</p>
                        <p className="flex items-center gap-3"><span className="text-2xl">🐑</span> <strong className="text-white">Click to launch explosive sheep</strong> from your cannon.</p>
                        <p className="flex items-center gap-3"><span className="text-2xl">💥</span> Sheep explosions trigger <strong className="text-purple-400">chain reactions</strong>.</p>
                      </div>

                      <button 
                        onClick={() => { setScore(0); setWave(1); setCowsAlive(5); setGameState('playing'); }}
                        className="group relative w-full py-5 bg-gradient-to-b from-green-400 to-green-600 hover:from-green-300 hover:to-green-500 text-white font-black text-2xl rounded-2xl flex items-center justify-center gap-3 transition-all hover:scale-[1.02] active:scale-[0.98] shadow-[0_0_30px_rgba(74,222,128,0.3)] border border-green-300/50 overflow-hidden"
                      >
                        <div className="absolute inset-0 bg-white/20 translate-y-[-100%] group-hover:translate-y-[100%] transition-transform duration-500"></div>
                        <Play size={32} fill="currentColor" className="drop-shadow-md" />
                        <span className="drop-shadow-md tracking-wide">DEFEND THE FARM</span>
                      </button>
                    </div>
                  </div>
                )}

                {gameState === 'gameover' && (
                  <div className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-purple-900/80 backdrop-blur-md">
                    <div className="bg-white border-4 border-purple-300 p-8 rounded-3xl text-center max-w-md shadow-2xl transform -rotate-1">
                      <Skull className="w-20 h-20 text-purple-500 mx-auto mb-4" />
                      <h2 className="text-4xl font-black mb-2 uppercase tracking-tighter text-slate-800">COWS ABDUCTED!</h2>
                      <p className="text-slate-600 mb-6 font-medium">The aliens took your entire herd.</p>
                      
                      <div className="bg-slate-100 rounded-2xl p-4 mb-6 border-2 border-slate-200 flex justify-between items-center">
                        <div className="text-left">
                          <div className="text-xs text-slate-500 uppercase tracking-widest mb-1 font-bold">Final Score</div>
                          <div className="text-4xl font-black text-slate-800">{score}</div>
                        </div>
                        <div className="text-right">
                          <div className="text-xs text-slate-500 uppercase tracking-widest mb-1 font-bold">Waves</div>
                          <div className="text-4xl font-black text-purple-500">{wave}</div>
                        </div>
                      </div>

                      <button 
                        onClick={() => { setScore(0); setWave(1); setCowsAlive(5); setGameState('playing'); }}
                        className="w-full py-4 bg-amber-400 hover:bg-amber-300 text-slate-900 font-black text-xl rounded-2xl flex items-center justify-center gap-2 transition-all hover:scale-105 active:scale-95 shadow-[0_10px_0_rgb(180,83,9)] hover:shadow-[0_5px_0_rgb(180,83,9)] hover:translate-y-[5px]"
                      >
                        <RotateCcw size={28} />
                        TRY AGAIN
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
